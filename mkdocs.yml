site_name: Nuka AI Research Series
site_url: https://nuka-ai.github.io
docs_dir: docs

theme:
  name: material
  logo: assets/hero.png
  palette:
    - scheme: slate
      primary: black
      accent: red
  features:
    - navigation.tabs
    - navigation.sections

plugins:
  - search
  - blog:
      blog_dir: posts
      post_dir: posts
      draft_if_future_date: true

nav:
  - Home: index.md
  - Research Logs: blog

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Nuka-AI
