site_name: Nuka-AI Research Series
site_url: https://nuka-ai.github.io
site_description: Technical research and advisories focusing on RCE and architectural trust gaps in AI orchestration frameworks.
site_author: Jeff Ponte (JDP Security)

theme:
  name: material
  logo: assets/hero.png
  favicon: assets/hero.png
  palette:
    - scheme: slate
      primary: black
      accent: red
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - content.code.copy

plugins:
  - search
  - rss:
      categories:
        - Research
        - Disclosure
  - glightbox:
      touchNavigation: true
      loop: false
  - social:
      cards: true
      cards_directory: .cache/social
      cards_layout_options:
        background_color: "#050505"
        color: "#ffffff"
        font_family: Roboto

nav:
  - Home: index.md
  - Research Logs: 
    - Overview: posts/init.md
    - April 23 Disclosure: posts/2026-07-14-initial-disclosure.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Nuka-AI
    - icon: fontawesome/brands/x-twitter
      link: https://x.com/JDPSec
    - icon: fontawesome/solid/paper-plane
      link: mailto:JDP.sec@proton.me
