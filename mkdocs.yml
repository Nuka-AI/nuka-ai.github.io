site_name: Nuka AI Research Series
site_url: https://nuka-ai.github.io
docs_dir: docs

theme:
  name: material
  logo: assets/hero.png
  favicon: assets/hero.png
  palette:
    - scheme: slate
      primary: black
      accent: red
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: default
      primary: black
      accent: red
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - content.code.copy
    - search.suggest
    - search.highlight

plugins:
  - search
  - blog:
      blog_dir: posts   # URL path will be /posts/
      post_dir: posts   # Sources from docs/posts/
      draft_if_future_date: true
      pagination_per_page: 5
  - minify:
      minify_html: true
  - rss:
      abstract_chars_count: 160

nav:
  - Home: index.md
  - Research Logs: posts/

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Nuka-AI
    - icon: fontawesome/solid/paper-plane
      link: mailto:Nuka.AI@proton.me
