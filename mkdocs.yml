site_name: Nuka-AI Research Series
site_url: https://nuka-ai.github.io
site_description: Technical advisories and architectural research on AI orchestration vulnerabilities and RCE.
site_author: Jeff Ponte (JDP Security)
docs_dir: docs

theme:
  name: material
  logo: assets/hero.png
  favicon: assets/hero.png
  palette:
    - scheme: slate
      primary: black
      accent: red
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - content.code.copy
    - toc.follow

plugins:
  - search
  - rss:
      categories:
        - Research
        - Disclosure
  - social:
      cards: true
      cards_directory: .cache/social
      cards_layout: theme/constantine # Fixes the "generic" look
      cards_layout_options:
        background_color: "#050505"
        color: "#ffffff"

nav:
  - Home: index.md
  - Research Logs: 
    - Overview: posts/init.md
    - April 23 Disclosure: posts/2026-07-14-initial-disclosure.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Nuka-AI
    - icon: fontawesome/brands/x-twitter
      link: https://x.com/JDPSec
    - icon: fontawesome/solid/paper-plane
      link: mailto:JDP.sec@proton.me
