site_name: Nuka AI Research Series
site_url: https://nuka-ai.github.io
docs_dir: docs

theme:
  name: material
  logo: assets/hero.png
  palette:
    - scheme: slate
      primary: black
      accent: red
  features:
    - navigation.tabs

plugins:
  - search
  - blog:
      # This forces the plugin to ONLY look in docs/posts/
      post_dir: posts 
      draft_if_future_date: true
      pagination: false

# This explicitly tells MkDocs which files are part of your site
nav:
  - Home: index.md
  - Research Logs: posts/

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Nuka-AI
