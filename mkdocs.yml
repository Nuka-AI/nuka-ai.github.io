site_name: Nuka AI Research Series
site_url: https://nuka-ai.github.io

theme:
  name: material
  palette:
    # DARK MODE (Vault Terminal)
    - scheme: slate
      primary: red # Nuka-Cola Red
      accent: orange # Radiation/Rust Accent
      toggle:
        icon: material/weather-night
        name: Switch to light mode
    # LIGHT MODE (Optional)
    - scheme: default
      primary: red
      accent: orange
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
  features:
    - navigation.tabs
    - content.code.copy
  font:
    code: Roboto Mono

plugins:
  - search
  - blog:
      draft_if_future_date: true # THE LOCKDOWN: Hidden until the date hits
      post_dir: docs/posts # Where your July write-ups will live

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Nuka-AI
