site_name: Nuka AI Research Series
site_url: https://nuka-ai.github.io

theme:
  name: material
  # Putting your bottlecap logo in the top-left header
  logo: assets/hero.png
  favicon: assets/hero.png
  
  palette:
    # DARK MODE (The Terminal Aesthetic)
    - scheme: slate
      primary: black   # Changes the header bar to dark terminal grey/black
      accent: red     # Nuka-Cola red for links, buttons, and hover states
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    # LIGHT MODE (Fallback)
    - scheme: default
      primary: black
      accent: red
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

  features:
    - navigation.tabs
    - navigation.top
    - content.code.copy  # Critical for exploit research snippets
    - search.suggest
    - search.highlight

  font:
    text: Roboto
    code: Roboto Mono # Monospaced font for that "terminal" feel

plugins:
  - search
  - blog:
      blog_dir: posts
      post_dir: docs/posts
      # THE LOCKDOWN: Content with future dates will NOT be published
      draft_if_future_date: true 
      pagination_per_page: 5

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Nuka-AI
    - icon: fontawesome/solid/paper-plane
      link: mailto:Nuka.AI@proton.me
