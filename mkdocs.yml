site_name: Nuka AI Research Series
site_url: https://nuka-ai.github.io
docs_dir: docs

theme:
  name: material
  logo: assets/hero.png
  palette:
    # Dark mode / High-contrast "Nuka" aesthetic
    - scheme: slate
      primary: black
      accent: red
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top

plugins:
  - search
  - blog:
      # This fixes the 404 by telling the plugin your blog lives at /posts/
      blog_dir: posts   
      post_dir: posts   
      # Ensures July disclosures stay hidden until the release date
      draft_if_future_date: true 
      pagination_per_page: 5

nav:
  - Home: index.md
  - Research Logs: posts/index.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Nuka-AI
