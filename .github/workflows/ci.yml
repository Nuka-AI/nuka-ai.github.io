name: ci
on:
  push:
    branches:
      - main
permissions:
  contents: write
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: 3.x

      - name: Install System Graphics Libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y libcairo2-dev libfreetype6-dev libffi-dev libjpeg-dev libpng-dev libz-dev

      - name: Install All Plugins
        run: |
          pip install mkdocs-material[imaging] mkdocs-glightbox mkdocs-minify-plugin mkdocs-rss-plugin

      - name: Build and Inject BlueSky Verification
        run: |
          # 1. Build the site normally
          mkdocs build
          
          # 2. Manually inject the BlueSky file into the output folder
          # This bypasses MkDocs' tendency to hide dot-folders
          mkdir -p site/.well-known
          cp docs/.well-known/atproto-did site/.well-known/atproto-did
          
          # 3. Deploy the pre-built 'site' folder to GitHub Pages
          # Using a specialized action for the manual injection step
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
