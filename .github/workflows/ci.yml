name: ci 
on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 5 * * *' # This runs the build automatically every day at 5:00 AM UTC
permissions:
  contents: write
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: 3.x
      - run: pip install -r requirements.txt
      - run: mkdocs gh-deploy --force

